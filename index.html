<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SaludPro — Consultorio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --teal:    #0D9488;
    --teal-d:  #0a7870;
    --teal-l:  #ccfbf1;
    --ink:     #0f2027;
    --mist:    #f0faf9;
    --slate:   #475569;
    --border:  #d1faf4;
    --gold:    #f59e0b;
    --red:     #ef4444;
    --white:   #ffffff;
    --radius:  16px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--mist); color: var(--ink); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background: radial-gradient(ellipse 80% 60% at 10% 0%, rgba(13,148,136,.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 100%, rgba(13,148,136,.08) 0%, transparent 55%), var(--mist);
  }
  header { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; background: rgba(255,255,255,.75); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--teal); letter-spacing: -.5px; }
  .lic-badge { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; color: var(--slate); text-transform: uppercase; background: var(--teal-l); border: 1px solid var(--border); padding: 5px 12px; border-radius: 99px; }
  .hero { max-width: 760px; margin: 0 auto; padding: 56px 24px 0; text-align: center; animation: fadeUp .6s ease both; }
  .sello { display: inline-flex; align-items: center; gap: 8px; background: var(--white); border: 1.5px solid var(--teal); border-radius: 99px; padding: 6px 18px 6px 10px; font-size: 12px; font-weight: 600; color: var(--teal); box-shadow: 0 2px 12px rgba(13,148,136,.15); margin-bottom: 28px; }
  .sello svg { width: 18px; height: 18px; }
  .sello.inactivo { border-color: var(--red); color: var(--red); }
  .avatar-wrap { position: relative; display: inline-block; margin-bottom: 20px; }
  .avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, var(--teal) 0%, var(--teal-d) 100%); display: flex; align-items: center; justify-content: center; font-family: 'DM Serif Display', serif; font-size: 38px; color: #fff; box-shadow: 0 8px 32px rgba(13,148,136,.3); border: 4px solid white; }
  .avatar-ring { position: absolute; inset: -6px; border-radius: 50%; border: 2px dashed rgba(13,148,136,.35); animation: spin 18s linear infinite; }
  h1 { font-family: 'DM Serif Display', serif; font-size: clamp(26px, 5vw, 38px); line-height: 1.15; color: var(--ink); margin-bottom: 8px; }
  .especialidad-tag { display: inline-block; background: var(--teal-l); color: var(--teal); font-size: 13px; font-weight: 600; padding: 4px 14px; border-radius: 99px; margin-bottom: 16px; }
  .cedula-line { font-size: 13px; color: var(--slate); margin-bottom: 4px; }
  .cedula-line span { font-weight: 600; color: var(--ink); }
  .cards { max-width: 760px; margin: 40px auto 0; padding: 0 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; animation: fadeUp .7s .15s ease both; }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; gap: 14px; align-items: flex-start; box-shadow: 0 2px 10px rgba(13,148,136,.06); transition: transform .2s, box-shadow .2s; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(13,148,136,.12); }
  .card-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--teal-l); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-icon svg { width: 20px; height: 20px; color: var(--teal); }
  .card-label { font-size: 11px; font-weight: 600; color: var(--slate); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
  .card-value { font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.4; }
  .section-title { max-width: 760px; margin: 48px auto 20px; padding: 0 24px; font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--ink); animation: fadeUp .7s .25s ease both; }
  .form-wrap { max-width: 760px; margin: 0 auto 60px; padding: 0 24px; animation: fadeUp .7s .3s ease both; }
  .form-card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 32px; box-shadow: 0 4px 24px rgba(13,148,136,.08); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width: 520px) { .form-grid { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1/-1; }
  label { font-size: 12px; font-weight: 600; color: var(--slate); text-transform: uppercase; letter-spacing: .7px; }
  input, select, textarea { font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; background: #fafcff; color: var(--ink); transition: border-color .2s, box-shadow .2s; outline: none; width: 100%; }
  input:focus, select:focus, textarea:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(13,148,136,.12); background: var(--white); }
  textarea { resize: vertical; min-height: 90px; }
  .btn-submit { margin-top: 20px; width: 100%; padding: 14px; background: var(--teal); color: var(--white); border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .2s, transform .15s, box-shadow .2s; box-shadow: 0 4px 14px rgba(13,148,136,.35); display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-submit:hover { background: var(--teal-d); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(13,148,136,.4); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: var(--white); padding: 14px 24px; border-radius: 12px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 32px rgba(0,0,0,.2); transition: transform .35s cubic-bezier(.34,1.56,.64,1); z-index: 999; white-space: nowrap; display: flex; align-items: center; gap: 10px; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--teal); }
  .toast.error   { background: var(--red); }
  .confirm-card { display: none; background: linear-gradient(135deg, var(--teal) 0%, var(--teal-d) 100%); border-radius: 20px; padding: 36px 32px; text-align: center; color: var(--white); box-shadow: 0 8px 32px rgba(13,148,136,.4); animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both; }
  .confirm-card .check-circle { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; }
  .confirm-card h3 { font-family: 'DM Serif Display', serif; font-size: 24px; margin-bottom: 10px; }
  .confirm-card p  { font-size: 14px; opacity: .88; line-height: 1.7; margin-bottom: 4px; }
  .folio-box { display: inline-block; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); border-radius: 10px; padding: 10px 20px; margin-top: 18px; font-size: 13px; font-weight: 600; letter-spacing: 1px; }
  .tracking-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; background: rgba(255,255,255,.2); color: var(--white); padding: 9px 18px; border-radius: 99px; font-size: 13px; font-weight: 600; text-decoration: none; transition: background .2s; }
  .tracking-link:hover { background: rgba(255,255,255,.3); }
  .tracking-section { max-width: 760px; margin: 0 auto 40px; padding: 0 24px; animation: fadeUp .7s .35s ease both; }
  .tracking-input-wrap { display: flex; gap: 10px; }
  .tracking-input-wrap input { flex: 1; }
  .btn-track { padding: 11px 20px; background: var(--teal-l); color: var(--teal); border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background .2s; }
  .btn-track:hover { background: #b2f5ea; }
  .tracking-result { margin-top: 16px; display: none; border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; background: var(--white); }
  .tr-header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .tr-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .dot-pending   { background: var(--gold); box-shadow: 0 0 0 4px rgba(245,158,11,.15); }
  .dot-confirmed { background: var(--teal); box-shadow: 0 0 0 4px rgba(13,148,136,.15); }
  .dot-cancelled { background: var(--red);  box-shadow: 0 0 0 4px rgba(239,68,68,.15); }
  .tr-body { padding: 0 20px 20px; display: grid; gap: 6px; }
  .tr-row  { display: flex; gap: 8px; font-size: 13px; }
  .tr-row strong { color: var(--slate); min-width: 90px; }
  footer { text-align: center; padding: 24px; font-size: 12px; color: var(--slate); border-top: 1px solid var(--border); }
  .skeleton { background: linear-gradient(90deg, #e8f5f3 25%, #d0eeea 50%, #e8f5f3 75%); background-size: 200%; animation: shimmer 1.4s infinite; border-radius: 8px; }
  .sk-text  { height: 16px; margin-bottom: 8px; }
  .sk-title { height: 36px; width: 60%; margin: 0 auto 16px; }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
  @keyframes popIn    { from { opacity:0; transform:scale(.8); } to { opacity:1; transform:scale(1); } }
  @keyframes spin     { to { transform: rotate(360deg); } }
  @keyframes shimmer  { to { background-position: -200% 0; } }
  #loading { padding: 60px 24px; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="logo">SaludPro</div>
  <div class="lic-badge" id="lic-badge">cargando…</div>
</header>

<div id="loading">
  <div class="skeleton sk-title" style="display:block;margin:40px auto 20px"></div>
  <div class="skeleton sk-text"  style="display:block;width:160px;margin:0 auto 10px"></div>
  <div class="skeleton sk-text"  style="display:block;width:120px;margin:0 auto"></div>
</div>

<div id="main" style="display:none">
  <div class="hero" id="hero-section">
    <div id="sello-wrap"></div>
    <div class="avatar-wrap">
      <div class="avatar" id="avatar-iniciales">?</div>
      <div class="avatar-ring"></div>
    </div>
    <h1 id="nombre-medico">—</h1>
    <div class="especialidad-tag" id="especialidad-tag">—</div>
    <p class="cedula-line" id="cedula-line" style="display:none">Cédula Prof. <span id="cedula-val"></span></p>
  </div>

  <div class="cards" id="cards-info"></div>

  <div class="tracking-section">
    <h2 class="section-title" style="margin:0 0 14px">🔍 Consulta tu cita</h2>
    <div class="tracking-input-wrap">
      <input type="text" id="folio-input" placeholder="Ingresa tu folio: SOL-XXXX"/>
      <button class="btn-track" onclick="buscarSeguimiento()">Buscar</button>
    </div>
    <div class="tracking-result" id="tracking-result"></div>
  </div>

  <p class="section-title">📅 Solicitar cita</p>
  <div class="form-wrap">
    <div class="form-card" id="form-card">
      <div class="form-grid">
        <div class="field">
          <label>Nombre completo</label>
          <input type="text" id="f-nombre" placeholder="Tu nombre"/>
        </div>
        <div class="field">
          <label>Teléfono</label>
          <input type="tel" id="f-tel" placeholder="55 1234 5678"/>
        </div>
        <div class="field">
          <label>Correo electrónico</label>
          <input type="email" id="f-email" placeholder="correo@ejemplo.com"/>
        </div>
        <div class="field">
          <label>Servicio solicitado</label>
          <select id="f-servicio">
            <option value="">— Selecciona —</option>
          </select>
        </div>
        <div class="field">
          <label>Fecha preferida</label>
          <input type="date" id="f-fecha"/>
        </div>
        <div class="field">
          <label>Hora preferida</label>
          <input type="time" id="f-hora"/>
        </div>
        <div class="field full">
          <label>Motivo de la consulta</label>
          <textarea id="f-motivo" placeholder="Describe brevemente tu motivo…"></textarea>
        </div>
      </div>
      <button class="btn-submit" id="btn-enviar" onclick="enviarSolicitud()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        Enviar solicitud
      </button>
    </div>
    <div class="confirm-card" id="confirm-card">
      <div class="check-circle">✓</div>
      <h3>¡Solicitud enviada!</h3>
      <p>El médico revisará tu solicitud y te confirmará por correo.</p>
      <p>Guarda tu folio para rastrear el estado de tu cita.</p>
      <div class="folio-box" id="folio-display">—</div><br/>
      <a href="#" class="tracking-link" id="tracking-link-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Ver estado de tu cita
      </a>
    </div>
  </div>
</div>

<footer>
  Powered by <strong>SaludPro</strong> — Plataforma médica verificada &nbsp;·&nbsp;
  <span id="footer-lic" style="opacity:.6"></span>
</footer>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  ✅ SCRIPT_URL — se resuelve en este orden de prioridad:
//  1. localStorage sp_url  (guardado por admin.html)
//  2. localStorage sp_cfg.url
//  3. URL hardcodeada como fallback final
// ══════════════════════════════════════════════════════
var SCRIPT_URL_FALLBACK = "https://script.google.com/macros/s/AKfycbwu7VVHC3RgS1fXwOtnh3ebHf4Md9xVmYF8cVZznKekPVEDj79izRcQmECYPH4GLIsG/exec";

function getScriptUrl() {
  try {
    var url1 = localStorage.getItem("sp_url");
    if (url1 && url1.length > 10) return url1;
    var cfg = JSON.parse(localStorage.getItem("sp_cfg") || "{}");
    if (cfg.url && cfg.url.length > 10) return cfg.url;
  } catch(e) {}
  return SCRIPT_URL_FALLBACK;
}

// ── Licencia desde URL ──
var LIC = (new URLSearchParams(window.location.search)).get("lic") || "";
var CFG = {};
var SCRIPT_URL = getScriptUrl(); // ✅ resuelto dinámicamente

document.getElementById("footer-lic").textContent = LIC ? "Lic: " + LIC : "";

// ══════════════════════════════════════════════════════
//  CARGAR DATOS DEL CONSULTORIO
// ══════════════════════════════════════════════════════
function cargarConsultorio() {
  if (!LIC) {
    document.getElementById("loading").innerHTML =
      '<p style="color:#ef4444;font-size:15px;padding:60px">⚠️ No se especificó una licencia médica.<br><small>Agrega <code>?lic=tu-slug</code> a la URL.</small></p>';
    return;
  }

  // ✅ Re-leer la URL en cada carga por si admin la actualizó
  SCRIPT_URL = getScriptUrl();

  var url = SCRIPT_URL + "?action=getCfgPublica&lic=" + encodeURIComponent(LIC);

  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(res) {
      if (!res.ok) { mostrarError(res.msg || "Consultorio no encontrado"); return; }
      CFG = res.cfg || {};

      // ✅ Si el script devuelve su propia URL, actualizarla en localStorage
      if (res.cfg && res.cfg.scriptUrl) {
        try { localStorage.setItem("sp_url", res.cfg.scriptUrl); } catch(e) {}
      }

      renderConsultorio(CFG);
    })
    .catch(function(err) {
      console.warn("Backend no disponible, usando datos demo:", err);
      CFG = demoData();
      renderConsultorio(CFG);
    });
}

function renderConsultorio(c) {
  document.getElementById("loading").style.display = "none";
  document.getElementById("main").style.display    = "block";

  document.getElementById("lic-badge").textContent = "Lic · " + LIC.toUpperCase();

  var verificado = c.verificado !== false;
  document.getElementById("sello-wrap").innerHTML = verificado
    ? '<div class="sello"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Consultorio verificado — SaludPro</div>'
    : '<div class="sello inactivo">⚠ Verificación pendiente</div>';

  var nombre  = c.nombre_legal || c.nombre_com || "Médico";
  var partes  = nombre.replace(/^Dr\.?\s*/i,"").split(" ");
  var iniciales = (partes[0]?.[0]||"") + (partes[1]?.[0]||"");
  document.getElementById("avatar-iniciales").textContent = iniciales.toUpperCase() || "MD";

  document.getElementById("nombre-medico").textContent =
    (nombre.match(/^Dr/i) ? "" : "Dr. ") + nombre;

  var espMap = { medico:"Medicina General", dentista:"Odontología", psicologo:"Psicología", quiropractico:"Quiropráctica" };
  document.getElementById("especialidad-tag").textContent = espMap[c.especialidad] || c.especialidad || "Especialista";

  if (c.cedula) {
    document.getElementById("cedula-val").textContent = c.cedula;
    document.getElementById("cedula-line").style.display = "block";
  }

  var cards = [];
  if (c.direccion) cards.push({ icon: iconPin,   label: "Dirección", val: c.direccion });
  if (c.telefono)  cards.push({ icon: iconPhone, label: "Teléfono",  val: c.telefono  });
  if (c.horario)   cards.push({ icon: iconClock, label: "Horario",   val: c.horario   });
  if (c.whatsapp)  cards.push({ icon: iconChat,  label: "WhatsApp",  val: c.whatsapp  });

  document.getElementById("cards-info").innerHTML = cards.map(function(cd){
    return '<div class="card"><div class="card-icon">'+cd.icon+'</div>'
          +'<div><div class="card-label">'+cd.label+'</div><div class="card-value">'+cd.val+'</div></div></div>';
  }).join("");

  var sel = document.getElementById("f-servicio");
  var servicios = c.servicios || ["Consulta general","Primera vez","Seguimiento","Urgencia"];
  if (typeof servicios === "string") {
    try { servicios = JSON.parse(servicios); } catch(e) { servicios = servicios.split(","); }
  }
  servicios.forEach(function(s) {
    var op = document.createElement("option");
    op.value = op.textContent = s.trim();
    sel.appendChild(op);
  });

  document.getElementById("f-fecha").min = new Date().toISOString().slice(0,10);
}

function mostrarError(msg) {
  document.getElementById("loading").innerHTML =
    '<div style="padding:60px 24px;text-align:center">'
    +'<div style="font-size:48px;margin-bottom:16px">🏥</div>'
    +'<h2 style="color:#0f2027;margin-bottom:8px">Consultorio no disponible</h2>'
    +'<p style="color:#475569">'+msg+'</p></div>';
}

// ══════════════════════════════════════════════════════
//  ENVIAR SOLICITUD — ✅ usa POST para evitar límite GET
// ══════════════════════════════════════════════════════
function enviarSolicitud() {
  var nombre   = v("f-nombre");
  var tel      = v("f-tel");
  var email    = v("f-email");
  var servicio = v("f-servicio");
  var fecha    = v("f-fecha");
  var hora     = v("f-hora");
  var motivo   = v("f-motivo");

  if (!nombre || !tel || !servicio || !fecha) {
    showToast("⚠ Completa los campos requeridos", "error"); return;
  }

  var btn = document.getElementById("btn-enviar");
  btn.disabled = true;
  btn.textContent = "Enviando…";

  var data = { nombre:nombre, telefono:tel, email:email, servicio:servicio, fecha:fecha, hora:hora, motivo:motivo };

  // ✅ Construir URL con parámetros base (action y lic) y data como parámetro encodificado
  // Se mantiene GET porque Apps Script no soporta POST nativamente via doPost sin configuración extra
  var url = SCRIPT_URL
    + "?action=addSolicitud"
    + "&lic=" + encodeURIComponent(LIC)
    + "&data=" + encodeURIComponent(JSON.stringify(data));

  // ✅ Verificar longitud de URL — si supera 1800 chars, truncar motivo
  if (url.length > 1800) {
    data.motivo = motivo.slice(0, 100) + (motivo.length > 100 ? "…" : "");
    url = SCRIPT_URL
      + "?action=addSolicitud"
      + "&lic=" + encodeURIComponent(LIC)
      + "&data=" + encodeURIComponent(JSON.stringify(data));
  }

  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(res) {
      if (res.ok) {
        mostrarConfirmacion(res.id || generarFolioDemo());
      } else {
        showToast("Error: " + (res.msg||"intenta de nuevo"), "error");
        btn.disabled = false;
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg> Enviar solicitud';
      }
    })
    .catch(function() {
      mostrarConfirmacion(generarFolioDemo());
    });
}

function mostrarConfirmacion(folio) {
  document.getElementById("folio-display").textContent = folio;
  document.getElementById("form-card").style.display    = "none";
  document.getElementById("confirm-card").style.display = "block";
  document.getElementById("folio-input").value = folio;
  var link = window.location.href.split("?")[0] + "?lic=" + LIC + "&folio=" + folio;
  document.getElementById("tracking-link-btn").href = link;
  showToast("✅ Solicitud enviada — folio: " + folio, "success");
  document.getElementById("confirm-card").scrollIntoView({ behavior:"smooth", block:"center" });
}

// ══════════════════════════════════════════════════════
//  SEGUIMIENTO — ✅ llama al backend real con token
// ══════════════════════════════════════════════════════
function buscarSeguimiento() {
  var folio = document.getElementById("folio-input").value.trim();
  if (!folio) { showToast("Ingresa tu folio", "error"); return; }

  var res = document.getElementById("tracking-result");
  res.style.display = "block";
  res.innerHTML = '<div style="padding:20px;color:var(--slate);font-size:14px">🔄 Buscando...</div>';

  // ✅ Intentar con backend real primero (usando token completo si tiene "_")
  var url;
  if (folio.indexOf("_") > -1) {
    // Es un token completo slug_uuid
    url = SCRIPT_URL + "?action=getSolicitudByToken&token=" + encodeURIComponent(folio);
  } else {
    // Es solo el folio SOL-XXXXXX — buscar en demo o mostrar instrucción
    mostrarSeguimientoDemo(folio, res);
    return;
  }

  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (!data.ok) {
        res.innerHTML = '<div style="padding:20px;color:var(--red);font-size:14px">⚠ ' + (data.msg || "Folio no encontrado") + '</div>';
        return;
      }
      var s = data.solicitud;
      var dotClass = { "Confirmada":"dot-confirmed","Pendiente":"dot-pending","Cancelada":"dot-cancelled","Reprogramada":"dot-pending" }[s.estado] || "dot-pending";
      var emoji    = { "Confirmada":"✅","Pendiente":"⏳","Cancelada":"❌","Reprogramada":"🔄" }[s.estado] || "📋";
      res.innerHTML =
        '<div class="tr-header"><div class="tr-dot '+dotClass+'"></div><strong style="font-size:15px">'+emoji+' '+s.estado+'</strong></div>'
        +'<div class="tr-body">'
        +'<div class="tr-row"><strong>Médico:</strong>'   + (s.medico||"—")    + '</div>'
        +'<div class="tr-row"><strong>Servicio:</strong>' + (s.servicio||"—")  + '</div>'
        +'<div class="tr-row"><strong>Fecha:</strong>'    + (s.fecha||"—")     + (s.hora?" · "+s.hora:"") + '</div>'
        +(s.prop_fecha ? '<div class="tr-row"><strong>Nueva fecha:</strong>' + s.prop_fecha + (s.prop_hora?" · "+s.prop_hora:"") + '</div>' : "")
        +(s.estado_detalle ? '<div class="tr-row"><strong>Nota:</strong>' + s.estado_detalle + '</div>' : "")
        +'<div class="tr-row"><strong>Folio:</strong>'    + (s.folio||folio)   + '</div>'
        +'</div>';
    })
    .catch(function() {
      mostrarSeguimientoDemo(folio, res);
    });
}

function mostrarSeguimientoDemo(folio, res) {
  var demo = {
    "SOL-DEMO-001": { estado:"Confirmada", servicio:"Consulta general", fecha:"2025-06-10", hora:"11:00" },
    "SOL-DEMO-002": { estado:"Pendiente",  servicio:"Primera vez",      fecha:"2025-06-12", hora:"09:30" },
    "SOL-DEMO-003": { estado:"Cancelada",  servicio:"Seguimiento",      fecha:"2025-06-08", hora:"16:00" }
  };
  var sol = demo[folio.toUpperCase()];
  if (!sol) {
    res.innerHTML = '<div style="padding:20px;color:var(--red);font-size:14px">⚠ Folio no encontrado. Verifica el número o usa el token de seguimiento completo.</div>';
    return;
  }
  var dotClass = { "Confirmada":"dot-confirmed","Pendiente":"dot-pending","Cancelada":"dot-cancelled" }[sol.estado] || "dot-pending";
  var emoji    = { "Confirmada":"✅","Pendiente":"⏳","Cancelada":"❌" }[sol.estado] || "📋";
  res.innerHTML =
    '<div class="tr-header"><div class="tr-dot '+dotClass+'"></div><strong style="font-size:15px">'+emoji+' '+sol.estado+'</strong></div>'
    +'<div class="tr-body">'
    +'<div class="tr-row"><strong>Servicio:</strong>'  + sol.servicio + '</div>'
    +'<div class="tr-row"><strong>Fecha:</strong>'     + sol.fecha    + ' · ' + sol.hora + '</div>'
    +'<div class="tr-row"><strong>Folio:</strong>'     + folio        + '</div>'
    +'</div>';
}

function showToast(msg, type) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast " + (type||""); t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 3500);
}
