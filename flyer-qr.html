<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Flyer QR — Consultas Saludables</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;600;700&family=Quicksand:wght@400;500;600;700&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* ══ VARIABLES ══ */
:root{
  --c1:#0D9488;--c1d:#0a7870;--c1l:#ccfbf1;
  --c-ink:#0f2027;--c-slate:#475569;--c-border:#d1faf4;
  --font-head:'DM Serif Display',serif;
  --font-body:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--font-body);background:#dde3ea;min-height:100vh;}

/* ══ TOOLBAR ══ */
@media screen{
  #toolbar{
    position:sticky;top:0;z-index:100;
    background:rgba(255,255,255,.96);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(0,0,0,.08);
    padding:10px 20px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .tb-logo{font-family:var(--font-head);font-size:17px;color:var(--c1);margin-right:auto;letter-spacing:-.3px;}
  .tb-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--c-slate);
    background:#f8fafc;border:1px solid #e2e8f0;padding:5px 12px;border-radius:99px;}
  .dot-ok  {width:7px;height:7px;border-radius:50%;background:#22c55e;}
  .dot-err {width:7px;height:7px;border-radius:50%;background:#ef4444;}
  .dot-spin{width:7px;height:7px;border-radius:50%;background:var(--c1);animation:pulse .9s infinite;}
  .btn-t{padding:8px 16px;border-radius:9px;font-family:var(--font-body);font-size:13px;font-weight:600;
    cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:.15s;}
  .btn-edit {background:var(--c1l);color:var(--c1);border:1.5px solid var(--c-border);}
  .btn-edit:hover{filter:brightness(.95);}
  .btn-print{background:linear-gradient(135deg,var(--c1),var(--c1d));color:#fff;
    box-shadow:0 3px 14px color-mix(in srgb,var(--c1) 40%,transparent);}
  .btn-print:hover{filter:brightness(1.08);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
}

/* ══ WRAPPER ══ */
.page-wrap{display:flex;align-items:flex-start;justify-content:center;padding:28px 16px;}

/* ══ HOJA CARTA 215.9 × 279.4 mm ══ */
.sheet{
  width:215.9mm;
  height:279.4mm;
  background:#fff;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  position:relative;
  box-shadow:0 12px 48px rgba(0,0,0,.22);
  overflow:hidden;
}

/* ══ TARJETA 107.95 × 139.7 mm
   Layout fiel a imagen de referencia:
   nombre → subtítulo → QR grande con logo → url → datos → banner → marca
══ */
.qr-card{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  padding:5mm 5.5mm 3.5mm;
  overflow:hidden;
  background:#ffffff;
  border:0.3px solid #dde5ee;
}

/* ── Nombre ── */
.c-nombre{
  font-family:var(--font-head);
  font-size:5mm;
  font-weight:700;
  color:var(--c-ink);
  text-align:center;
  line-height:1.2;
  letter-spacing:-.2px;
  position:relative;z-index:1;
}

/* ── Subtítulo ── */
.c-sub{
  font-size:2.7mm;
  color:var(--c-slate);
  text-align:center;
  font-weight:400;
  position:relative;z-index:1;
}

/* ── Especialidad pill ── */
.c-esp{
  display:inline-flex;align-items:center;
  background:var(--c1l);
  color:var(--c1d);
  font-size:2.1mm;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;
  padding:.8mm 3mm;border-radius:99px;
  border:1px solid var(--c-border);
  position:relative;z-index:1;
}

/* ── Contenedor QR: fondo pill suave igual que imagen ── */
.c-qr-wrap{
  position:relative;z-index:1;
  background:color-mix(in srgb,var(--c1l) 55%,#fff);
  border-radius:4mm;
  padding:3mm;
  width:88%;
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:1.5mm 0;
}
/* El canvas/img del QR llena el contenedor */
.c-qr-wrap canvas,
.c-qr-wrap img{
  display:block !important;
  width:100% !important;
  height:auto !important;
  border-radius:1.5mm;
}

/* ── URL truncada ── */
.c-url{
  position:relative;z-index:1;
  font-size:2mm;
  color:var(--c-slate);
  background:color-mix(in srgb,var(--c1l) 40%,#fff);
  border:1px solid var(--c-border);
  border-radius:2mm;
  padding:1.2mm 3mm;
  width:100%;
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  font-family:monospace;
}

/* ── Datos de contacto ── */
.c-footer{
  width:100%;
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  gap:1.2mm;
}
.c-row{display:flex;align-items:flex-start;gap:2mm;}
.c-ico{font-size:2.8mm;flex-shrink:0;width:4.5mm;text-align:center;padding-top:.15mm;}
.c-txt{font-size:2.6mm;font-weight:500;color:var(--c-ink);line-height:1.3;flex:1;}

/* ── Banner ── */
.c-banner{
  width:100%;
  padding:2mm 3mm;border-radius:2mm;
  background:linear-gradient(135deg,var(--c1),var(--c1d));
  text-align:center;font-size:2.6mm;font-weight:700;color:#fff;
  letter-spacing:.3px;line-height:1.4;
  position:relative;z-index:1;
  display:flex;align-items:center;justify-content:center;
  min-height:6mm;
  box-shadow:0 2px 8px color-mix(in srgb,var(--c1) 35%,transparent);
  overflow:hidden;
}
.c-banner::before{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:rgba(255,255,255,.13);pointer-events:none;
}

/* ── Marca ── */
.c-marca{
  font-size:1.9mm;
  color:color-mix(in srgb,var(--c-slate) 45%,transparent);
  text-align:center;letter-spacing:.5px;
  font-weight:600;text-transform:uppercase;
  position:relative;z-index:1;
}

/* ══ GUÍAS DE CORTE ══ */
.cut-h{position:absolute;left:0;right:0;top:50%;height:0;border-top:1px dashed #b0bec5;z-index:20;pointer-events:none;}
.cut-v{position:absolute;top:0;bottom:0;left:50%;width:0;border-left:1px dashed #b0bec5;z-index:20;pointer-events:none;}
.cut-i{position:absolute;font-size:11px;color:#90a4ae;z-index:21;pointer-events:none;}
.ci-tl{top:calc(50% - 8px);left:3px;}
.ci-tr{top:calc(50% - 8px);right:3px;}
.ci-bl{bottom:3px;left:calc(50% - 5px);}
.ci-br{top:3px;right:calc(50% - 5px);}

/* ══ MODAL ══ */
#modal-edit{display:none;position:fixed;inset:0;background:rgba(15,32,39,.6);
  backdrop-filter:blur(6px);z-index:500;align-items:center;justify-content:center;padding:20px;}
#modal-edit.on{display:flex;}
.edit-card{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both;}
.edit-card h3{font-family:var(--font-head);font-size:20px;color:var(--c1);margin-bottom:3px;}
.edit-card p{font-size:13px;color:var(--c-slate);margin-bottom:18px;}
.ef{margin-bottom:14px;}
.ef label{display:block;font-size:11px;font-weight:700;color:var(--c-slate);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.ef textarea{width:100%;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:10px;
  font-family:var(--font-body);font-size:14px;outline:none;transition:.2s;
  background:#fafcff;color:var(--c-ink);resize:vertical;min-height:72px;}
.ef textarea:focus{border-color:var(--c1);box-shadow:0 0 0 3px color-mix(in srgb,var(--c1) 12%,transparent);}
.ef-cnt{font-size:11px;color:var(--c-slate);margin-top:3px;text-align:right;}
.edit-btns{display:flex;gap:10px;margin-top:16px;}
.btn-save{flex:1;padding:12px;background:var(--c1);color:#fff;border:none;border-radius:10px;
  font-family:var(--font-body);font-size:14px;font-weight:700;cursor:pointer;transition:.2s;}
.btn-save:hover{background:var(--c1d);}
.btn-cancel{padding:12px 16px;background:none;border:1.5px solid #e2e8f0;border-radius:10px;
  font-family:var(--font-body);font-size:14px;color:var(--c-slate);cursor:pointer;}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--c-ink);color:#fff;padding:10px 20px;border-radius:11px;
  font-size:13px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.2);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--c1);}

@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

/* ══ PRINT ══ */
@media print{
  @page{size:letter;margin:0;}
  html,body{background:#fff!important;margin:0!important;padding:0!important;}
  #toolbar,#modal-edit,.toast{display:none!important;}
  .page-wrap{padding:0!important;display:block!important;}
  .sheet{width:215.9mm!important;height:279.4mm!important;box-shadow:none!important;page-break-after:always;}
}
</style>
</head>
<body>

<div id="toolbar">
  <div class="tb-logo">🖨️ Flyer QR</div>
  <div class="tb-pill">
    <div class="dot-spin" id="sdot"></div>
    <span id="stxt">Cargando…</span>
  </div>
  <button class="btn-t btn-edit" onclick="abrirEditor()">✏️ Editar banner</button>
  <button class="btn-t btn-print" onclick="window.print()">🖨️ Imprimir / PDF</button>
</div>

<div class="page-wrap">
  <div class="sheet">
    <div class="qr-card" id="c0"></div>
    <div class="qr-card" id="c1"></div>
    <div class="qr-card" id="c2"></div>
    <div class="qr-card" id="c3"></div>
    <div class="cut-h"></div>
    <div class="cut-v"></div>
    <span class="cut-i ci-tl">✂</span>
    <span class="cut-i ci-tr">✂</span>
    <span class="cut-i ci-bl">✂</span>
    <span class="cut-i ci-br">✂</span>
  </div>
</div>

<div id="modal-edit">
  <div class="edit-card">
    <h3>✏️ Editar banner</h3>
    <p>Texto que aparece en la franja inferior de cada tarjeta.</p>
    <div class="ef">
      <label>Mensaje</label>
      <textarea id="inp-banner" maxlength="90"
        oninput="document.getElementById('efcnt').textContent=this.value.length+'/90'"
        placeholder="📅 Agenda tu cita hoy · Primer consulta con descuento"></textarea>
      <div class="ef-cnt"><span id="efcnt">0</span>/90</div>
    </div>
    <div class="edit-btns">
      <button class="btn-save" onclick="guardarBanner()">💾 Aplicar</button>
      <button class="btn-cancel" onclick="cerrarEditor()">Cancelar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ════════════ CONFIG ════════════
var LIC        = (new URLSearchParams(window.location.search)).get("lic")||"";
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwu7VVHC3RgS1fXwOtnh3ebHf4Md9xVmYF8cVZznKekPVEDj79izRcQmECYPH4GLIsG/exec";

var PALETAS=[
  {id:"teal",    c1:"#0D9488",c1d:"#0a7870",c1l:"#ccfbf1",ink:"#0f2027",slate:"#475569",border:"#d1faf4"},
  {id:"rosa",    c1:"#C084A0",c1d:"#A8607E",c1l:"#fdeef5",ink:"#3d1a28",slate:"#8B4A63",border:"#f5cfe0"},
  {id:"morado",  c1:"#9B7EC8",c1d:"#7B5EA8",c1l:"#f0ebfa",ink:"#2d1f4a",slate:"#6B4E9A",border:"#ddd0f2"},
  {id:"violeta", c1:"#7C6FCD",c1d:"#5E52B0",c1l:"#eeedfb",ink:"#1e1c3a",slate:"#5548A8",border:"#cdc9f0"},
  {id:"lila",    c1:"#B07EC8",c1d:"#9060B0",c1l:"#f5edfb",ink:"#2e1a3d",slate:"#7A4A9A",border:"#e8d0f5"},
  {id:"lavanda", c1:"#8B7EC8",c1d:"#6B5EA8",c1l:"#edeafb",ink:"#1e1b4b",slate:"#5b4e96",border:"#d8d2f5"},
  {id:"uva",     c1:"#7878C8",c1d:"#5858A8",c1l:"#eeeeff",ink:"#1a1a3a",slate:"#4848A0",border:"#d0d0f0"},
  {id:"cielo",   c1:"#6AAED4",c1d:"#4A8EB8",c1l:"#e8f4fb",ink:"#0c2e45",slate:"#3A7A9A",border:"#c0dff0"},
  {id:"menta",   c1:"#5BAD8A",c1d:"#3D906C",c1l:"#e6f7f1",ink:"#0f3628",slate:"#2E7A58",border:"#b0e0ce"},
  {id:"durazno", c1:"#D4956A",c1d:"#B87040",c1l:"#fff3e8",ink:"#3a1f0a",slate:"#9A6040",border:"#f5d8b8"},
];
var FUENTES=[
  {id:"dm",       head:"DM Serif Display", body:"DM Sans"},
  {id:"playfair", head:"Playfair Display", body:"Lora"},
  {id:"cormorant",head:"Cormorant Garamond",body:"Nunito"},
  {id:"nunito",   head:"Nunito",           body:"Nunito"},
  {id:"quicksand",head:"Quicksand",        body:"Quicksand"},
  {id:"josefin",  head:"Josefin Sans",     body:"Josefin Sans"},
];

var CFG         = {};
var BANNER_TEXT = "📅 Agenda tu cita — Atención personalizada y profesional";
var URL_QR      = "";
var PAL         = PALETAS[0];

// ════════════ TEMA ════════════
function aplicarTema(pid,fid){
  PAL = PALETAS.find(function(x){return x.id===pid;})||PALETAS[0];
  var f = FUENTES.find(function(x){return x.id===fid;})||FUENTES[0];
  var r = document.documentElement.style;
  r.setProperty('--c1',PAL.c1);r.setProperty('--c1d',PAL.c1d);r.setProperty('--c1l',PAL.c1l);
  r.setProperty('--c-ink',PAL.ink);r.setProperty('--c-slate',PAL.slate);r.setProperty('--c-border',PAL.border);
  r.setProperty('--font-head',"'"+f.head+"',serif");
  r.setProperty('--font-body',"'"+f.body+"',sans-serif");
}

// ════════════ CARGA ════════════
function cargar(){
  setS("spin","Cargando…");
  if(!LIC){ setS("err","⚠ Falta ?lic="); renderCards(demo()); return; }
  fetch(SCRIPT_URL+"?action=getCfgPublica&lic="+encodeURIComponent(LIC))
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.ok){ setS("err","No encontrado"); renderCards(demo()); return; }
      CFG=d.cfg||{};
      if(CFG.scriptUrl&&CFG.scriptUrl.length>10) SCRIPT_URL=CFG.scriptUrl;
      if(CFG.paleta||CFG.fuente) aplicarTema(CFG.paleta||"teal",CFG.fuente||"dm");
      if(CFG.banner_activo&&CFG.banner_texto) BANNER_TEXT=CFG.banner_texto;
      setS("ok",CFG.nombre_com||LIC);
      renderCards(CFG);
    })
    .catch(function(e){
      console.warn("flyer:",e);
      setS("err","Sin conexión");
      renderCards(demo());
    });
}
function setS(t,txt){
  document.getElementById("sdot").className=t==="ok"?"dot-ok":t==="err"?"dot-err":"dot-spin";
  document.getElementById("stxt").textContent=txt;
}
function demo(){
  return{nombre_com:"Dr. Carlos García",prefijo:"Dr.",especialidad_txt:"Medicina Familiar",
    direccion:"Av. Insurgentes Sur 450, CDMX",telefono:"55 8800 1234",logo:""};
}

// ════════════ RENDER ════════════
function renderCards(cfg){
  var base = window.location.href.split("flyer-qr")[0]+"consultorio.html";
  URL_QR   = base+"?lic="+encodeURIComponent(LIC||"demo");

  var pref   = cfg.prefijo||"";
  var nom    = cfg.nombre_com||cfg.nombre_legal||"Consultorio";
  var disp   = pref?pref+" "+nom:nom;
  var esp    = cfg.especialidad_txt||cfg.especialidad||"";
  var espMap = {medico:"Medicina General",dentista:"Odontología",psicologo:"Psicología",
                quiropractico:"Quiropráctica",nutriologo:"Nutriología"};
  var espTxt = espMap[esp]||esp;
  var logo   = cfg.logo||"";
  var dir    = cfg.direccion||"—";
  var tel    = cfg.telefono||"—";
  var parts  = nom.replace(/^(Dr|Dra|Lic|Mtro|Mtra|Psic|Ing)\.\s*/i,"").split(" ");
  var ini    = ((parts[0]||"")[0]||"").toUpperCase()+((parts[1]||"")[0]||"").toUpperCase();

  for(var i=0;i<4;i++){
    document.getElementById("c"+i).innerHTML=mkHTML(disp,espTxt,dir,tel,i);
  }
  setTimeout(function(){ for(var i=0;i<4;i++) mkQR(i,logo,ini); },150);
}

// ════════════ HTML TARJETA ════════════
function mkHTML(nom,esp,dir,tel,i){
  var urlShort = URL_QR.replace(/^https?:\/\//,"");
  return (
    '<div class="c-nombre">'+esc(nom)+'</div>'
   +'<div class="c-sub">📱 Escanea para agendar tu cita</div>'
   +(esp?'<div class="c-esp">'+esc(esp)+'</div>':'')
   +'<div class="c-qr-wrap"><div id="qr'+i+'"></div></div>'
   +'<div class="c-url">'+esc(urlShort)+'</div>'
   +'<div class="c-footer">'
     +'<div class="c-row"><div class="c-ico">📍</div><div class="c-txt">'+esc(dir)+'</div></div>'
     +'<div class="c-row"><div class="c-ico">📞</div><div class="c-txt">'+esc(tel)+'</div></div>'
   +'</div>'
   +'<div class="c-banner" id="bn'+i+'">'+esc(BANNER_TEXT)+'</div>'
   +'<div class="c-marca">Consultas Saludables</div>'
  );
}

// ════════════ QR + LOGO CENTRAL (lógica original) ════════════
function mkQR(idx,logoSrc,ini){
  var cont=document.getElementById("qr"+idx);
  if(!cont) return;
  cont.innerHTML="";

  var SIZE=320;

  var tmp=document.createElement("div");
  tmp.style.cssText="position:fixed;bottom:-9999px;left:-9999px;visibility:hidden;";
  document.body.appendChild(tmp);

  try{
    new QRCode(tmp,{
      text:URL_QR,
      width:SIZE,height:SIZE,
      colorDark: PAL.ink||"#0f2027",
      colorLight:"#ffffff",
      correctLevel:QRCode.CorrectLevel.H
    });
  }catch(e){ removeTmp(tmp); return; }

  setTimeout(function(){
    var qc=tmp.querySelector("canvas");
    var qi=tmp.querySelector("img");
    var src=qc?qc.toDataURL("image/png"):(qi?qi.src:null);
    if(!src){ removeTmp(tmp); return; }
    compositar(src,cont,idx,logoSrc,ini,tmp);
  },200);
}

function compositar(qrSrc,cont,idx,logoSrc,ini,tmp){
  var SIZE=320;
  var out=document.createElement("canvas");
  out.width=SIZE; out.height=SIZE;
  var ctx=out.getContext("2d");

  var base=new Image();
  base.onload=function(){
    ctx.drawImage(base,0,0,SIZE,SIZE);

    var cx=SIZE/2, cy=SIZE/2;
    var r=Math.round(SIZE*0.14);

    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,r+5,0,2*Math.PI);
    ctx.fillStyle="#ffffff"; ctx.fill();
    ctx.restore();

    if(logoSrc&&logoSrc.length>100){
      var li=new Image();
      li.crossOrigin="anonymous";
      li.onload=function(){
        ctx.save();
        ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI);
        ctx.clip();
        ctx.drawImage(li,cx-r,cy-r,r*2,r*2);
        ctx.restore();
        pintarAnillo(ctx,cx,cy,r);
        mostrar(out,cont,tmp);
      };
      li.onerror=function(){ pintarIni(ctx,cx,cy,r,ini,out,cont,tmp); };
      li.src=logoSrc;
    } else {
      pintarIni(ctx,cx,cy,r,ini,out,cont,tmp);
    }
  };
  base.onerror=function(){ removeTmp(tmp); };
  base.src=qrSrc;
}

function pintarAnillo(ctx,cx,cy,r){
  ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI);
  ctx.strokeStyle=PAL.c1||"#0D9488";
  ctx.lineWidth=4; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,r+4,0,2*Math.PI);
  ctx.strokeStyle=PAL.c1l||"#ccfbf1";
  ctx.lineWidth=2; ctx.stroke();
}

function pintarIni(ctx,cx,cy,r,ini,out,cont,tmp){
  var g=ctx.createRadialGradient(cx-r*.25,cy-r*.25,0,cx,cy,r);
  g.addColorStop(0,PAL.c1||"#0D9488");
  g.addColorStop(1,PAL.c1d||"#0a7870");
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI);
  ctx.fillStyle=g; ctx.fill();
  ctx.fillStyle="#fff";
  var fs=Math.round(r*.88);
  ctx.font="bold "+fs+"px 'DM Serif Display',serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText((ini||"?").slice(0,2),cx,cy+2);
  ctx.restore();
  pintarAnillo(ctx,cx,cy,r);
  mostrar(out,cont,tmp);
}

function mostrar(canvas,cont,tmp){
  removeTmp(tmp);
  canvas.style.cssText="display:block;border-radius:1.5mm;width:100%;height:auto;";
  cont.innerHTML="";
  cont.appendChild(canvas);
}
function removeTmp(tmp){ try{document.body.removeChild(tmp);}catch(e){} }

// ════════════ BANNER ════════════
function abrirEditor(){
  document.getElementById("inp-banner").value=BANNER_TEXT;
  document.getElementById("efcnt").textContent=BANNER_TEXT.length+"/90";
  document.getElementById("modal-edit").classList.add("on");
  setTimeout(function(){var t=document.getElementById("inp-banner");t.focus();t.select();},200);
}
function cerrarEditor(){ document.getElementById("modal-edit").classList.remove("on"); }
function guardarBanner(){
  var v=document.getElementById("inp-banner").value.trim();
  if(!v){ showToast("Escribe un mensaje"); return; }
  BANNER_TEXT=v;
  for(var i=0;i<4;i++){var b=document.getElementById("bn"+i);if(b)b.textContent=v;}
  cerrarEditor(); showToast("✅ Banner actualizado","ok");
}
document.addEventListener("keydown",function(e){
  if(e.key==="Escape") cerrarEditor();
  if(e.key==="Enter"&&document.getElementById("modal-edit").classList.contains("on")){
    e.preventDefault(); guardarBanner();
  }
});

// ════════════ UTILS ════════════
function esc(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#x27;");
}
function showToast(msg,type){
  var t=document.getElementById("toast");
  t.textContent=msg; t.className="toast "+(type||""); t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},3000);
}

cargar();
